hotkey:
  # Push-to-talk combo. Most Mac keyboards never deliver a key-down event for
  # Fn to userspace listeners, so ordinary modifiers are the reliable default.
  combo: "cmd+alt"
  # Opens the "correct last dictation" dialog (learns misrecognized words).
  # Useful when the menubar icon is unavailable; empty string disables it.
  correction_combo: "ctrl+alt+c"

audio:
  samplerate: 16000
  channels: 1
  preroll_ms: 500

vad:
  # Auto-stop after a run of silence. With push-to-talk the key release is
  # the natural stop, so this is a safety net, not a cutoff — keep silence_ms
  # generous or set enabled: false to record for as long as the key is held.
  enabled: true
  energy_threshold: 0.01
  silence_ms: 2000
  min_speech_ms: 200

whisper:
  # "small" is multilingual (auto-detects the spoken language);
  # use "small.en" for slightly better English-only accuracy.
  model: "small"
  device: "auto"
  compute_type: "int8"
  # Pin to "de", "en", … to skip the per-utterance language detection pass
  # (~0.6 s faster); "auto" detects the language each time.
  language: "auto"
  cpu_threads: 8

ollama:
  base_url: "http://localhost:11434"
  model: "qwen2.5:7b"
  fallback_model: "qwen2.5:3b"
  timeout_s: 30
  # Keep the model loaded between dictations (avoids multi-second cold
  # starts). Ollama's default unloads after only 5 minutes idle.
  keep_alive: "30m"

dictionary:
  path: "~/.config/localflow/dictionary.json"

cleanup:
  # "full":   remove fillers, apply self-corrections, format spoken lists,
  #           adapt tone per app.
  # "format": keep every word verbatim, but add structure — numbered lists,
  #           email greeting/sign-off lines, paragraph breaks.
  # "light":  only remove fillers and add punctuation/capitalization.
  # Use "format" or "light" if the model rewrites your speech too much.
  mode: "full"

overlay:
  # Floating waveform pill shown while recording (Wispr-style).
  enabled: true
  position: "bottom-center"  # or "top-right"

paste:
  restore_clipboard_after_ms: 300

pipeline:
  min_duration_s: 0.3
  # Transcribe while you speak so long dictations paste almost immediately
  # after key release instead of waiting for a full transcription pass.
  streaming: true
